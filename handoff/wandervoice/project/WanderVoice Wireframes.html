<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WanderVoice — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Inter', sans-serif; }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">

// ─── TOKENS ──────────────────────────────────────────────────────────────────
const C = {
  leaf:    '#1C2720', canopy: '#162218', teal:  '#2A7560',
  gold:    '#E8A850', mist:   '#F5F7F2', mistBg:'#EFF4EE',
  bark:    '#6B7C6A', dew:    '#D4DFD3', verified:'#27AE60',
};
const F = "'Inter', sans-serif";
const border  = '1.5px solid rgba(28,39,32,0.18)';
const borderT = `1.5px solid ${C.teal}`;
const borderG = `1.5px solid ${C.gold}`;
const borderD = '1.5px solid rgba(245,247,242,0.15)';

// ─── PRIMITIVES ───────────────────────────────────────────────────────────────
const T = ({size=12, weight=400, color=C.leaf, style={}, children}) => (
  <div style={{fontFamily:F, fontSize:size, fontWeight:weight, color, lineHeight:1.45, ...style}}>{children}</div>
);
const Div = ({color='rgba(28,39,32,0.12)', my=8}) => (
  <div style={{height:1, background:color, margin:`${my}px 0`}} />
);

// ─── ICONS (stroke SVG, 20×20 grid) ──────────────────────────────────────────
const Icon = ({d, size=18, color='currentColor', viewBox='0 0 24 24', fill='none', sw=1.8, style={}}) => (
  <svg width={size} height={size} viewBox={viewBox} fill={fill} stroke={color}
    strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>
    <path d={d}/>
  </svg>
);
const Ico = {
  home:    <Icon d="M3 12L12 3l9 9M5 10v10h5v-6h4v6h5V10"/>,
  gem:     <Icon d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>,
  bars:    <Icon d="M4 18v-6M9 18V6M14 18v-8M19 18v-4"/>,
  person:  <Icon d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>,
  mic:     <Icon d="M12 1a3 3 0 013 3v8a3 3 0 01-6 0V4a3 3 0 013-3zM19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>,
  heart:   <Icon d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>,
  share:   <Icon d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/>,
  back:    <Icon d="M19 12H5M12 19l-7-7 7-7"/>,
  check:   <Icon d="M20 6L9 17l-5-5"/>,
  close:   <Icon d="M18 6L6 18M6 6l12 12"/>,
  chevron: <Icon d="M9 18l6-6-6-6"/>,
  clock:   <Icon d="M12 22a10 10 0 100-20 10 10 0 000 20zM12 6v6l4 2"/>,
  pause:   <Icon d="M6 4h4v16H6zM14 4h4v16h-4"/>,
  play:    <svg width={18} height={18} viewBox="0 0 24 24" fill={C.mist}><path d="M5 3l14 9-14 9V3z"/></svg>,
  map:     <Icon d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0zM12 10a1 1 0 100-2 1 1 0 000 2z"/>,
  diamond: null, // rendered inline as rotated square
};

// ─── WAVEFORM ─────────────────────────────────────────────────────────────────
const Wave = ({color=C.teal, n=20, h=28, active=true}) => {
  const hs = [4,8,14,20,26,20,14,20,26,28,22,16,10,18,24,18,10,14,20,14,8,12,20,14,8];
  return (
    <div style={{display:'flex',alignItems:'center',gap:2.5,height:h}}>
      {hs.slice(0,n).map((v,i)=>(
        <div key={i} style={{width:2.5,height:active?v:3,background:color,borderRadius:2,opacity:active?(0.45+(v/28)*0.55):0.22}}/>
      ))}
    </div>
  );
};

// ─── MAP SKETCH ───────────────────────────────────────────────────────────────
const Map = ({dark=false, h=140, gems=true}) => {
  const bg = dark ? '#1A2820' : '#C4D4C0';
  const grid = dark ? 'rgba(245,247,242,0.08)' : 'rgba(28,39,32,0.10)';
  const road = dark ? 'rgba(245,247,242,0.28)' : 'rgba(28,39,32,0.22)';
  return (
    <div style={{background:bg,height:h,borderRadius:8,position:'relative',overflow:'hidden'}}>
      {[0.28,0.55,0.78].map(x=><div key={x} style={{position:'absolute',left:`${x*100}%`,top:0,bottom:0,borderLeft:`1px solid ${grid}`}}/>)}
      {[0.35,0.68].map(y=><div key={y} style={{position:'absolute',top:`${y*100}%`,left:0,right:0,borderTop:`1px solid ${grid}`}}/>)}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} viewBox="0 0 200 140" preserveAspectRatio="none">
        <path d="M100 0 C94 28 118 48 100 76 C82 104 112 122 100 140" stroke={road} strokeWidth="7" fill="none" strokeLinecap="round"/>
      </svg>
      {gems && <>
        <div style={{position:'absolute',left:'20%',top:'28%',width:10,height:10,background:C.teal,transform:'rotate(45deg)',borderRadius:2}}/>
        <div style={{position:'absolute',right:'22%',top:'52%',width:10,height:10,background:C.teal,transform:'rotate(45deg)',borderRadius:2}}/>
        <div style={{position:'absolute',left:'58%',top:'18%',width:8,height:8,background:dark?C.mist:C.leaf,borderRadius:'50%'}}/>
      </>}
      <div style={{position:'absolute',left:'47%',top:'44%',transform:'translate(-50%,-50%)'}}>
        <div style={{width:14,height:14,background:C.teal,borderRadius:'50%',border:`2.5px solid ${C.mist}`,boxShadow:`0 0 0 5px rgba(42,117,96,0.22)`}}/>
      </div>
    </div>
  );
};

// ─── NARRATIVE TOGGLE ─────────────────────────────────────────────────────────
const NarrativeToggle = ({active, onToggle, dark=false}) => (
  <div onClick={onToggle} style={{
    display:'flex',flexDirection:'column',alignItems:'center',gap:6,
    padding:'14px 32px',borderRadius:32,cursor:'pointer',userSelect:'none',
    background: active ? C.teal : (dark?'rgba(245,247,242,0.07)':C.mistBg),
    border: active ? `2px solid ${C.teal}` : (dark?borderD:border),
    boxShadow: active ? '0 0 0 7px rgba(42,117,96,0.16)' : 'none',
    transition:'all 0.2s',
  }}>
    <div style={{display:'flex',alignItems:'center',gap:3,height:22}}>
      {active
        ? [5,10,18,14,22,18,12,20,22,16,10,18,14,8].map((v,i)=>(
            <div key={i} style={{width:2.5,height:v,background:C.mist,borderRadius:2,opacity:0.6+(v/22)*0.4}}/>
          ))
        : [<div key="a" style={{width:3.5,height:18,background:dark?C.bark:C.bark,borderRadius:2}}/>,
           <div key="b" style={{width:3.5,height:18,background:dark?C.bark:C.bark,borderRadius:2,marginLeft:6}}/>]
      }
    </div>
    <T size={13} weight={600} color={active?C.mist:(dark?'rgba(245,247,242,0.55)':C.bark)}>
      {active ? 'Pause Narrative' : 'Continue Narrative'}
    </T>
    <T size={10} color={active?'rgba(245,247,242,0.65)':(dark?'rgba(245,247,242,0.3)':C.bark)}>
      {active ? 'AI narrating your walk' : 'Tap to resume guide'}
    </T>
  </div>
);

// ─── MODE PILL ROW ────────────────────────────────────────────────────────────
const ModePills = ({mode, setMode, dark=false}) => (
  <div style={{display:'flex',gap:5}}>
    {['Story','Facts','Secrets'].map(m=>(
      <div key={m} onClick={()=>setMode(m)} style={{
        padding:'4px 11px',borderRadius:20,cursor:'pointer',
        border: mode===m ? borderT : (dark?borderD:border),
        background: mode===m ? C.teal : 'transparent',
      }}>
        <T size={11} weight={mode===m?600:400} color={mode===m?C.mist:(dark?'rgba(245,247,242,0.5)':C.bark)}>{m}</T>
      </div>
    ))}
  </div>
);

// ─── TABS: Info / Narrative / History ────────────────────────────────────────
const Tabs = ({tab, setTab, dark=false}) => {
  const tabs = ['Info','Narrative','History'];
  const bg   = dark ? 'rgba(255,255,255,0.04)' : 'white';
  const abg  = dark ? 'rgba(42,117,96,0.18)'   : C.mistBg;
  return (
    <div style={{display:'flex',borderBottom:dark?borderD:border}}>
      {tabs.map((t,i)=>(
        <div key={t} onClick={()=>setTab(i)} style={{
          flex:1,padding:'9px 0',textAlign:'center',cursor:'pointer',
          background:tab===i?abg:bg,
          borderRight:i<2?(dark?borderD:border):'none',
        }}>
          <T size={12} weight={tab===i?600:400} color={tab===i?C.teal:(dark?'rgba(245,247,242,0.45)':C.bark)}>{t}</T>
        </div>
      ))}
    </div>
  );
};

// ─── POI INFO TAB (text only) ─────────────────────────────────────────────────
const InfoTab = ({dark=false}) => (
  <div style={{padding:'12px 14px',display:'flex',flexDirection:'column',gap:8}}>
    <T size={17} weight={700} color={dark?C.mist:C.leaf}>Hàng Bạc Silver Street</T>
    <T size={12} color={C.bark}>Est. 1428</T>
    <Div color={dark?'rgba(245,247,242,0.08)':'rgba(28,39,32,0.10)'} my={4}/>
    {[['Type','Jewellery guild district'],['District','Hoàn Kiếm, Hanoi'],['Length','450 m'],['Founded by','Silversmiths of Châu Khê']].map(([k,v])=>(
      <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <T size={11} color={C.bark}>{k}</T>
        <T size={12} weight={500} color={dark?C.mist:C.leaf}>{v}</T>
      </div>
    ))}
    <Div color={dark?'rgba(245,247,242,0.08)':'rgba(28,39,32,0.10)'} my={4}/>
    <T size={12} color={C.bark} style={{lineHeight:1.65}}>
      The street was established under the Lê dynasty guild system. Artisans migrated from Châu Khê village to produce silverwork and, later, coins for the royal court.
    </T>
  </div>
);

// ─── NARRATIVE TAB (core feature) ────────────────────────────────────────────
const NarrativeTab = ({dark=false}) => {
  const [narrating, setNarrating] = React.useState(true);
  const [mode, setMode] = React.useState('Story');
  const suggestions = [
    {label:'Switch to Secrets?', reason:'This street has hidden guild rituals'},
    {label:'Try Facts mode', reason:'Dates and measurements available'},
  ];
  return (
    <div style={{padding:'12px 14px',display:'flex',flexDirection:'column',gap:12}}>
      {/* Place + mode */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <T size={14} weight={600} color={dark?C.mist:C.leaf}>Hàng Bạc Silver Street</T>
          <T size={11} color={C.bark} style={{marginTop:2}}>Est. 1428 · Jewellery guild</T>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,color:C.bark}}>
          {Ico.mic}
          <T size={11} color={C.teal}>Ask</T>
        </div>
      </div>

      {/* Mode selector */}
      <ModePills mode={mode} setMode={setMode} dark={dark}/>

      {/* Narrative toggle — THE core button */}
      <div style={{display:'flex',justifyContent:'center',paddingTop:4}}>
        <NarrativeToggle active={narrating} onToggle={()=>setNarrating(p=>!p)} dark={dark}/>
      </div>

      {/* Quick style suggestions */}
      <div>
        <T size={10} weight={500} color={C.bark} style={{letterSpacing:1,marginBottom:6}}>QUICK SUGGESTIONS</T>
        {suggestions.map(s=>(
          <div key={s.label} style={{
            display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'8px 10px',borderRadius:8,marginBottom:5,
            border:dark?borderD:border,
            background:dark?'rgba(245,247,242,0.04)':'white',cursor:'pointer',
          }}>
            <div>
              <T size={12} weight={500} color={dark?C.mist:C.leaf}>{s.label}</T>
              <T size={10} color={C.bark}>{s.reason}</T>
            </div>
            <div style={{color:C.teal}}>{Ico.chevron}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── HISTORY TAB ─────────────────────────────────────────────────────────────
const HistoryTab = ({dark=false}) => {
  const items = [
    {time:'9:44',place:'Hàng Bạc Silver St.',mode:'Story',  snippet:'…the silversmiths arrived from Châu Khê in 1428, carrying tools wrapped in…'},
    {time:'9:38',place:'Bach Ma Temple',    mode:'Secrets', snippet:'…the well beneath the altar hasn\'t been mentioned in any official guide…'},
    {time:'9:21',place:'Đồng Xuân Market', mode:'Facts',   snippet:'…opened in 1889 under French colonial administration, originally covering…'},
    {time:'9:05',place:'Hoan Kiem Lake',   mode:'Story',   snippet:'…the turtle surfaced three times before the sword was returned, according to…'},
  ];
  return (
    <div style={{padding:'10px 14px',display:'flex',flexDirection:'column',gap:6}}>
      <T size={10} weight={500} color={C.bark} style={{letterSpacing:1,marginBottom:2}}>TODAY'S NARRATIVE</T>
      {items.map((it,i)=>(
        <div key={i} style={{
          padding:'9px 11px',borderRadius:10,
          border:dark?borderD:border,
          background:dark?'rgba(245,247,242,0.04)':'white',
        }}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <T size={11} weight={600} color={dark?C.mist:C.leaf}>{it.place}</T>
              <div style={{padding:'1px 6px',borderRadius:10,background:C.teal}}>
                <T size={9} weight={500} color={C.mist}>{it.mode}</T>
              </div>
            </div>
            <T size={10} color={C.bark}>{it.time}</T>
          </div>
          <T size={11} color={C.bark} style={{lineHeight:1.5}}>{it.snippet}</T>
        </div>
      ))}
    </div>
  );
};

// ─── BOTTOM SHEET with tabs ───────────────────────────────────────────────────
const BottomSheet = ({dark=false, defaultTab=1}) => {
  const [tab, setTab] = React.useState(defaultTab);
  const bg = dark ? 'rgba(22,34,24,0.97)' : 'white';
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',
      background:bg,borderRadius:'14px 14px 0 0',
      border:dark?borderD:border,borderBottom:'none'}}>
      <Tabs tab={tab} setTab={setTab} dark={dark}/>
      <div style={{flex:1,overflowY:'auto'}}>
        {tab===0 && <InfoTab dark={dark}/>}
        {tab===1 && <NarrativeTab dark={dark}/>}
        {tab===2 && <HistoryTab dark={dark}/>}
      </div>
    </div>
  );
};

// ─── FLOATING PILL NAVBAR ─────────────────────────────────────────────────────
const NavBar = ({active=0}) => {
  const [tab, setTab] = React.useState(active);
  const icons = [Ico.home, Ico.gem, Ico.bars, Ico.person];
  return (
    <div style={{
      position:'absolute',bottom:14,left:'50%',transform:'translateX(-50%)',
      display:'flex',alignItems:'center',gap:3,
      background:'rgba(22,34,24,0.96)',borderRadius:50,padding:'5px 8px',
      boxShadow:'0 4px 24px rgba(0,0,0,0.38)',zIndex:100,
    }}>
      {icons.map((icon,i)=>(
        <div key={i} onClick={()=>setTab(i)} style={{
          width:44,height:44,borderRadius:'50%',
          display:'flex',alignItems:'center',justifyContent:'center',
          background:tab===i?C.teal:'transparent',
          color:tab===i?C.mist:'rgba(245,247,242,0.38)',
          cursor:'pointer',transition:'background 0.16s,color 0.16s',
        }}>
          {icon}
        </div>
      ))}
    </div>
  );
};

const WithNav = ({children, navActive=0, bg=C.mist}) => (
  <div style={{width:'100%',height:'100%',position:'relative',background:bg,overflow:'hidden',display:'flex',flexDirection:'column'}}>
    <div style={{flex:1,overflowY:'auto',paddingBottom:72}}>
      {children}
    </div>
    <NavBar active={navActive}/>
  </div>
);

// ─── APPROACH BANNER ──────────────────────────────────────────────────────────
const ApproachBanner = ({name='Hàng Bạc Silver Street', dist='120m'}) => (
  <div style={{margin:'0 12px 6px',background:C.gold,borderRadius:10,padding:'7px 12px',display:'flex',alignItems:'center',gap:8}}>
    <div style={{width:9,height:9,background:C.leaf,transform:'rotate(45deg)',borderRadius:2,flexShrink:0}}/>
    <div style={{flex:1}}>
      <T size={12} weight={600} color={C.leaf}>{name}</T>
      <T size={10} color={'rgba(28,39,32,0.65)'}>{dist} ahead · narrative queued</T>
    </div>
    <div style={{color:C.leaf}}>{Ico.chevron}</div>
  </div>
);

// ─── SUB-PLACE CHIP ───────────────────────────────────────────────────────────
const SubPlaceChip = ({label='Bach Ma Temple · Main Hall', dark=false, onClick}) => (
  <div onClick={onClick} style={{
    display:'inline-flex',alignItems:'center',gap:6,
    padding:'5px 10px',borderRadius:20,cursor:'pointer',
    background:dark?'rgba(245,247,242,0.06)':'rgba(42,117,96,0.07)',
    border:dark?borderD:borderT,
  }}>
    <div style={{width:6,height:6,borderRadius:'50%',background:C.teal}}/>
    <T size={11} weight={500} color={dark?C.mist:C.teal}>{label}</T>
    <T size={11} color={C.bark}>↓</T>
  </div>
);

// ─── METRIC STRIP (Strava-style) ──────────────────────────────────────────────
const MetricStrip = ({dark=false}) => (
  <div style={{display:'flex',gap:0,padding:'7px 14px',borderBottom:dark?borderD:border}}>
    {[['1.2km','walked'],['4','gems'],['22m','guided']].map(([v,l],i)=>(
      <div key={l} style={{flex:1,textAlign:'center',borderRight:i<2?(dark?borderD:border):'none'}}>
        <T size={17} weight={700} color={dark?C.mist:C.leaf}>{v}</T>
        <T size={10} color={C.bark}>{l}</T>
      </div>
    ))}
  </div>
);

// ─────────────────────────────────────────────────────────────────────────────
// SCREEN 1 — MAIN MAP + AUDIO GUIDE (3 variations)
// ─────────────────────────────────────────────────────────────────────────────

// A: Light, content-first
const S1A = () => (
  <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.mist,fontFamily:F}}>
    <div style={{padding:'6px 14px',display:'flex',justifyContent:'space-between',background:C.leaf}}>
      <T size={11} color={C.mist}>9:41</T>
      <T size={11} color={C.bark}>Old Quarter · Hanoi</T>
      <T size={11} color={C.mist}>···</T>
    </div>
    <div style={{padding:'8px 12px 0'}}>
      <div style={{position:'relative'}}>
        <Map h={128}/>
        <div style={{position:'absolute',top:6,right:6,background:C.gold,borderRadius:12,padding:'2px 8px'}}>
          <T size={10} weight={500} color={C.leaf}>◈ 120m</T>
        </div>
        <div style={{position:'absolute',bottom:6,left:8}}>
          <SubPlaceChip label="Old Quarter · Hàng Bạc"/>
        </div>
      </div>
    </div>
    <div style={{flex:1,margin:'8px 12px 0',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <BottomSheet dark={false} defaultTab={1}/>
    </div>
  </div>
);

// B: Dark, Strava metrics
const S1B = () => (
  <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.leaf,fontFamily:F}}>
    <div style={{padding:'6px 14px',display:'flex',justifyContent:'space-between'}}>
      <T size={11} color={C.mist}>9:41</T>
      <T size={11} color={C.bark}>Old Quarter · Hanoi</T>
      <T size={11} color={C.mist}>···</T>
    </div>
    <div style={{padding:'0 12px'}}>
      <Map h={170} dark/>
    </div>
    <MetricStrip dark/>
    <div style={{flex:1,margin:'0 12px',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <BottomSheet dark={true} defaultTab={1}/>
    </div>
  </div>
);

// C: Floating cards, approach-first
const S1C = () => (
  <div style={{display:'flex',flexDirection:'column',height:'100%',background:C.mistBg,fontFamily:F}}>
    <div style={{padding:'6px 14px',display:'flex',justifyContent:'space-between',background:C.mist,borderBottom:border}}>
      <T size={11} color={C.leaf}>9:41</T>
      <T size={11} color={C.bark}>Old Quarter</T>
      <T size={11} color={C.leaf}>···</T>
    </div>
    <div style={{padding:'8px 12px 0'}}>
      <MetricStrip dark={false}/>
    </div>
    <div style={{padding:'6px 12px 0'}}>
      <Map h={130}/>
    </div>
    <ApproachBanner/>
    <div style={{flex:1,margin:'0 12px',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <BottomSheet dark={false} defaultTab={1}/>
    </div>
  </div>
);

// ─────────────────────────────────────────────────────────────────────────────
// SCREEN 2 — VOICE INPUT (3 variations)

          {['S','F','X'].map((m,i)=>(

              <T size={10} weight={600} color={mode===['Story','Facts','Secrets'][i]?C.mist:C.bark}>{m}</T>

      <div style={{display:'flex',flexDirection:'column',gap:8}}>

          <div style={{flex:1}}>
            <T size={12} weight={600} color={C.leaf}>Hàng Bạc approaching</T>

// ─────────────────────────────────────────────────────────────────────────────
// SCREEN 7 — ONBOARDING: AUTO-AUDIO + LEADING INSTRUCTIONS
// ─────────────────────────────────────────────────────────────────────────────
const S7A = () => {
  const [autoOn, setAutoOn] = React.useState(false);
  const [leading, setLeading] = React.useState(true);
  const Toggle = ({on, toggle}) => (
    <div onClick={toggle} style={{width:44,height:24,borderRadius:12,background:on?C.teal:'rgba(245,247,242,0.15)',position:'relative',cursor:'pointer',flexShrink:0}}>
      <div style={{position:'absolute',top:3,left:on?22:3,width:18,height:18,borderRadius:'50%',background:C.mist,transition:'left 0.2s'}}/>
    </div>
  );
  return (
    <div style={{width:'100%',height:'100%',background:C.leaf,display:'flex',flexDirection:'column',fontFamily:F,padding:'16px 18px'}}>
      <div style={{display:'flex',gap:4,marginBottom:20}}>
        {[1,1,1,0].map((f,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:f?C.teal:'rgba(245,247,242,0.15)'}}/>)}
      </div>
      <T size={18} weight={700} color={C.mist} style={{marginBottom:4,lineHeight:1.3}}>Set up your walking experience</T>
      <T size={12} color={C.bark} style={{marginBottom:18,lineHeight:1.65}}>WanderVoice detects nearby gems as you walk. Here's how it will guide you.</T>
      {[
        {key:'auto',on:autoOn,toggle:()=>setAutoOn(p=>!p),title:'Auto-audio',desc:'When you walk within 50m of a gem, the guide begins automatically — no tapping required.',confirm:'Will start playing as you approach each gem'},
        {key:'lead',on:leading,toggle:()=>setLeading(p=>!p),title:'Leading instructions',desc:'Your guide will tell you what to look for before you arrive — "look up at the gate" or "the smell of incense is from the left."',confirm:'Guide will cue your senses as you approach'},
      ].map(s=>(
        <div key={s.key} style={{background:'rgba(245,247,242,0.06)',border:s.on?borderT:borderD,borderRadius:12,padding:'12px 14px',marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <T size={13} weight={600} color={C.mist}>{s.title}</T>
            <Toggle on={s.on} toggle={s.toggle}/>
          </div>
          <T size={11} color={C.bark} style={{lineHeight:1.55}}>{s.desc}</T>
          {s.on && <div style={{marginTop:8,padding:'6px 10px',background:'rgba(42,117,96,0.15)',borderRadius:8,border:`1px solid rgba(42,117,96,0.3)`}}>
            <T size={10} color={C.teal}>✓ {s.confirm}</T>
          </div>}
        </div>
      ))}
      <div style={{background:'rgba(232,168,80,0.12)',border:borderG,borderRadius:10,padding:'10px 12px',marginBottom:'auto'}}>
        <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
          <T size={14} color={C.gold} style={{marginTop:1}}>✦</T>
          <T size={11} color={'rgba(232,168,80,0.9)'} style={{lineHeight:1.55}}>Guides are AI-generated in real time, grounded in your location and chosen narrative mode.</T>
        </div>
      </div>
      <div style={{marginTop:16,background:C.teal,borderRadius:14,padding:'13px 20px',textAlign:'center',cursor:'pointer'}}>
        <T size={14} weight={600} color={C.mist}>Start wandering</T>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// SCREEN 8 — SUB-PLACE SELECTION
// ─────────────────────────────────────────────────────────────────────────────
const S8A = () => {
  const [sel, setSel] = React.useState('Main Library');
  const [narrating, setNarrating] = React.useState(false);

    {name:'Main Library',hint:'You may be here',ai:false},

    <div style={{width:'100%',height:'100%',background:C.mist,display:'flex',flexDirection:'column',fontFamily:F}}>
      <div style={{padding:'10px 14px',borderBottom:border}}>

      <div style={{padding:'8px 14px 4px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>

        <T size={11} color={C.teal} style={{cursor:'pointer'}}>Not sure</T>
      </div>
      <div style={{flex:1,padding:'0 12px',display:'flex',flexDirection:'column',gap:5,overflowY:'auto'}}>
        {places.map(p=>(
          <div key={p.name} onClick={()=>setSel(p.name)} style={{padding:'9px 12px',borderRadius:10,border:sel===p.name?borderT:border,background:sel===p.name?'rgba(42,117,96,0.06)':'white',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}>
            <div style={{width:18,height:18,borderRadius:'50%',border:sel===p.name?`2px solid ${C.teal}`:'2px solid rgba(28,39,32,0.2)',background:sel===p.name?C.teal:'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
              {sel===p.name && <div style={{width:6,height:6,borderRadius:'50%',background:C.mist}}/>}

            {narrating?'Narrating '+sel:'Guide will focus on '+sel}

        </div>
      </div>
    </div>
  );
};

      <DCSection id="s4" title="Screen 4 — Gem Discovery">
